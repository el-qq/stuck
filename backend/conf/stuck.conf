# STUCK backend configuration (env-style key=value).
# Loaded by app/config.py (pydantic-settings). Environment variables with the
# same names override these values. This file is the canonical key inventory.

# Optional NGFW host locked on the login form: IP or domain, WITHOUT
# port/scheme/path. Leave empty to let the administrator enter a host. The API
# port is appended from STUCK_NGFW_PORT. An environment value takes precedence.
STUCK_DEFAULT_SERVER=

# (v2) NGFW API port; the backend builds the base URL as https://<host>:<port>.
STUCK_NGFW_PORT=8443

# Allowed NGFW destinations. Production/Docker startup is fail-closed: provide
# at least one exact IPv4/hostname or CIDR. Comma-separated values are accepted.
STUCK_ALLOWED_NGFW_HOSTS=
STUCK_ALLOWED_NGFW_CIDRS=

# Explicit local-lab escape hatch. npm start sets this to true; Docker keeps the
# secure false default unless the operator opts in.
STUCK_ALLOW_ANY_NGFW=false

# STUCK session TTL in hours — 10 per the tech task (cookie Max-Age 36000).
# The NGFW session may expire earlier; STUCK then asks for the password again
# while retaining the rules cache.
STUCK_SESSION_TTL_HOURS=10

# Secure flag on the stuck_session cookie. Docker is HTTPS by default. The
# local `npm start` command explicitly sets this to false for HTTP localhost.
STUCK_COOKIE_SECURE=true

# SameSite policy for the stuck_session cookie: lax | strict | none.
STUCK_COOKIE_SAMESITE=lax

# Verify the NGFW TLS certificate. NGFW commonly uses a self-signed cert, so the
# default is false. Set true and provide STUCK_NGFW_CA_BUNDLE to enable verification.
STUCK_NGFW_VERIFY_TLS=false

# Path to a CA bundle used when STUCK_NGFW_VERIFY_TLS=true. Empty = system default.
STUCK_NGFW_CA_BUNDLE=

# (v2) NOTE: STUCK_RULES_CACHE_TTL_MIN removed — the binding pool lives for the
# whole process lifetime; reset only by restart or POST /api/rules/refresh.

# Comma-separated list of browser origins allowed for CORS (credentialed).
# Not needed when frontend and backend share an origin (Vite proxy or Caddy).
STUCK_ALLOWED_ORIGINS=https://localhost

# Port the backend listens on (used by the container entrypoint / uvicorn).
STUCK_BACKEND_PORT=8000

# Default destination port assumed for a trace when the URL has no explicit port.
STUCK_TRACE_DEFAULT_PORT=443

# Per-request timeout (seconds) for calls to the NGFW.
STUCK_NGFW_TIMEOUT_SECONDS=15

# Logging level: DEBUG | INFO | WARNING | ERROR (default INFO).
STUCK_LOG_LEVEL=INFO

# Log format: text (key-value lines) | json (one JSON object per line).
STUCK_LOG_FORMAT=text

# Log destination file. Empty = stdout (docker-friendly default).
STUCK_LOG_FILE=

# (v2.3) Rules export — enabled by default; set false to disable it.
# When true, GET /api/rules/export returns the current binding's rules snapshot
# as JSON (for inspection and as a stable fixture for engine tests) and the UI
# shows an "Export rules" button. When false, the endpoint answers 404 (feature
# is not discoverable) and the button is hidden. The export never contains
# secrets (no NGFW cookie, no password) and is strictly scoped to the caller's
# own (admin+server) binding taken from the session, never from request params.
STUCK_ENABLE_RULES_EXPORT=true

# Animate trace stages in the UI. Set false to render the full result
# immediately, without the stage reveal or its "Skip animation" button.
STUCK_ENABLE_TRACE_ANIMATION=true
